version: '3.8'

services:
  database:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'ChangeMeRootPass123!'
      MYSQL_DATABASE: 'panel'
      MYSQL_USER: 'pterodactyl'
      MYSQL_PASSWORD: 'ChangeMeUserPass123!'
    volumes:
      - ./db/:/var/lib/mysql

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      APP_URL: "http://localhost:8080"
      APP_ENV: "production"
      APP_ENVIRONMENT_ONLY: "false"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "panel"
      DB_USERNAME: "pterodactyl"
      DB_PASSWORD: "ChangeMeUserPass123!"
      CACHE_DRIVER: "file"
      SESSION_DRIVER: "file"
      QUEUE_CONNECTION: "sync"
    volumes:
      - ./panel_var/:/app/var/
      - ./panel_nginx/:/etc/nginx/http.d/
    depends_on:
      - database
